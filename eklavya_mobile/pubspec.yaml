name: eklavya_mobile
description: "AI-powered personalized learning & goal execution platform with gamification."

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.2.1
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.4
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  lottie: ^3.3.1
  http: ^1.2.1
  supabase_flutter: ^2.7.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0A0A1A"
  adaptive_icon_foreground: "assets/images/app_icon_fg.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0A0A1A"
  color_dark: "#0A0A1A"
  image: assets/images/splash_logo.png
  android: true
  ios: false
  android_12:
    color: "#0A0A1A"
    icon_background_color: "#0A0A1A"
    image: assets/images/splash_logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
    - assets/images/
